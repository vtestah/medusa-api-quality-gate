name: integration (live runtime)

# Поднимает реальный рантайм (Medusa + PostgreSQL + Redis) прямо в пайплайне,
# сидит демо-данные, достаёт publishable key из БД и прогоняет ПОЛНЫЙ pytest-набор.
# В отличие от quality-gate.yml (быстрый, property/unit), здесь contract/negative/
# cart/db/localization выполняются по-настоящему, а не скипаются.

on:
  push:
    branches: [main, master]
  schedule:
    # Ночной прогон против живого рантайма (UTC).
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  integration:
    name: Live Store API + PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: quality-gate/pyproject.toml

      - name: Install quality-gate (dev extras)
        run: python -m pip install -e "./quality-gate[dev]"

      - name: Bring up runtime (postgres + redis + medusa)
        run: docker compose up -d --build --wait postgres redis medusa

      - name: Seed demo data
        run: docker compose exec -T medusa pnpm seed

      - name: Create the admin user (for Admin API tests)
        run: docker compose exec -T medusa pnpm exec medusa user -e admin@example.com -p supersecret

      - name: Resolve publishable key from the database
        id: key
        run: |
          KEY="$(docker compose exec -T postgres \
            psql -U postgres -d medusa -At \
            -c "select token from api_key where type = 'publishable' limit 1;")"
          test -n "$KEY" || { echo "::error::no publishable key found after seed"; exit 1; }
          echo "value=$KEY" >> "$GITHUB_OUTPUT"

      - name: Run full suite against the live runtime (runtime tests must not skip)
        working-directory: quality-gate
        env:
          QUALITY_GATE_MEDUSA_BASE_URL: http://localhost:9000
          QUALITY_GATE_PUBLISHABLE_KEY: ${{ steps.key.outputs.value }}
          QUALITY_GATE_DB_URL: postgresql://postgres:postgres@localhost:5433/medusa
          QUALITY_GATE_ADMIN_EMAIL: admin@example.com
          QUALITY_GATE_ADMIN_PASSWORD: supersecret
        run: python -m pytest -ra -q --cov-report=xml --junitxml=junit.xml

      - name: Test summary
        if: always()
        continue-on-error: true
        working-directory: quality-gate
        env:
          SUMMARY_LABEL: "integration (live runtime)"
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import glob
          import os
          import xml.etree.ElementTree as ET

          label = os.environ.get("SUMMARY_LABEL", "tests")
          files = glob.glob("junit.xml")
          if not files:
              print(f"### {label}\n\nNo JUnit results found.")
              raise SystemExit(0)

          tests = failures = errors = skipped = 0
          duration = 0.0
          for path in files:
              for suite in ET.parse(path).getroot().iter("testsuite"):
                  tests += int(suite.get("tests", 0))
                  failures += int(suite.get("failures", 0))
                  errors += int(suite.get("errors", 0))
                  skipped += int(suite.get("skipped", 0))
                  duration += float(suite.get("time", 0) or 0)

          passed = tests - failures - errors - skipped
          print(
              f"### {label}\n\n"
              f"{tests} tests — {passed} passed, {failures} failed, "
              f"{errors} errors, {skipped} skipped in {duration:.1f}s"
          )
          PY

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: quality-gate/junit.xml
          if-no-files-found: ignore

      - name: Medusa logs (on failure)
        if: failure()
        run: docker compose logs --tail=200 medusa

      - name: Tear down
        if: always()
        run: docker compose down -v
