name: pages (Allure report)

# Best-effort, non-blocking: прогоняет pytest с Allure-результатами, собирает
# статический Allure-отчёт и публикует его на GitHub Pages.
# Запускается по расписанию и вручную (не на push), поэтому не влияет на required checks.
# Pages нужно включить в настройках репозитория отдельно (Settings -> Pages -> GitHub Actions).

on:
  schedule:
    # Ночная сборка Allure-отчёта (UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build Allure report and deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: quality-gate/pyproject.toml

      - name: Install quality-gate (dev extras)
        run: python -m pip install -e "./quality-gate[dev]"

      - name: Run pytest with Allure results
        working-directory: quality-gate
        continue-on-error: true
        # Слой без рантайма всегда даёт результаты; live-тесты скипаются здесь.
        run: python -m pytest -q --alluredir=allure-results

      - name: Set up Java (for the Allure CLI)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate static Allure report
        run: |
          mkdir -p quality-gate/allure-results
          npm install -g allure-commandline
          allure generate quality-gate/allure-results --clean -o allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
