name: quality-gate CI

on:
  push:
    branches: [main, master]
    paths:
      - "quality-gate/**"
      - ".github/workflows/quality-gate.yml"
  pull_request:
    paths:
      - "quality-gate/**"
      - ".github/workflows/quality-gate.yml"

defaults:
  run:
    working-directory: quality-gate

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Type-check (mypy strict)
        run: python -m mypy

      - name: Run tests with coverage
        # Live integration tests skip automatically when Medusa/PostgreSQL are
        # unavailable; the property and unit layers run on every push.
        run: python -m pytest -q --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: quality-gate/coverage.xml
          if-no-files-found: ignore
