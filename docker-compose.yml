services:
  postgres:
    image: postgres:18-alpine
    container_name: ecom_quality_gate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medusa}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - medusa_network

  redis:
    image: redis:8-alpine
    container_name: ecom_quality_gate_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - medusa_network

  medusa:
    build:
      context: ./apps/medusa
      dockerfile: Dockerfile
    container_name: ecom_quality_gate_medusa
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /server
    environment:
      NODE_ENV: development
      PORT: 9000
      STORE_CORS: ${MEDUSA_STORE_CORS:-http://localhost:8000}
      ADMIN_CORS: ${MEDUSA_ADMIN_CORS:-http://localhost:5173,http://localhost:9000}
      AUTH_CORS: ${MEDUSA_AUTH_CORS:-http://localhost:5173,http://localhost:9000,http://localhost:8000}
      DATABASE_URL: ${MEDUSA_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/medusa}
      REDIS_URL: ${MEDUSA_REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${MEDUSA_JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET:-supersecret}
      MEDUSA_ADMIN_ONBOARDING_TYPE: ${MEDUSA_ADMIN_ONBOARDING_TYPE:-default}
    ports:
      - "9000:9000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./apps/medusa:/server
      - medusa_node_modules:/server/node_modules
      - medusa_uploads:/server/uploads
    networks:
      - medusa_network

  storefront:
    build:
      context: .
      dockerfile: ./apps/storefront/Dockerfile
    container_name: ecom_quality_gate_storefront
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    working_dir: /workspace
    environment:
      NODE_ENV: development
      MEDUSA_BACKEND_URL: http://medusa:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${STOREFRONT_MEDUSA_PUBLISHABLE_KEY:-pk_test}
      NEXT_PUBLIC_BASE_URL: ${STOREFRONT_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEFAULT_REGION: ${STOREFRONT_DEFAULT_REGION:-ru}
      REVALIDATE_SECRET: ${STOREFRONT_REVALIDATE_SECRET:-supersecret}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/ru', { redirect: 'manual' }).then((response) => process.exit(response.status < 400 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./apps/storefront:/workspace/apps/storefront
      - storefront_node_modules:/workspace/apps/storefront/node_modules
    networks:
      - medusa_network

volumes:
  postgres_data:
  medusa_node_modules:
  medusa_uploads:
  storefront_node_modules:

networks:
  medusa_network:
    driver: bridge
